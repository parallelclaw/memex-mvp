name: memex
version: 0.1.3
description: |
  Bridges Hermes Agent into the memex unified-memory corpus.

  If you ONLY use Hermes, its built-in memory (state.db + MEMORY.md +
  Active Memory) likely covers your needs — installing this plugin is
  redundant. memex-hermes earns its place when you ALSO use Claude Code /
  OpenClaw / Cursor / Telegram and want one searchable history across all
  of them via memex-mvp (npm).

  Turns are stored verbatim — no LLM extraction, no cloud, no auth.

# stdlib only — no extra packages needed.
pip_dependencies: []
